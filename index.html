<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="description" content="CyberSafe - Protecting your digital security and privacy with advanced cybersecurity solutions.">
    <meta name="keywords" content="cybersecurity, privacy, security, protection, digital safety">
    <meta name="theme-color" content="#1a1a2e">
    <meta name="author" content="CyberSafe">
    
    <!-- Open Graph Meta Tags for Social Sharing -->
    <meta property="og:title" content="CyberSafe - Digital Security Solutions">
    <meta property="og:description" content="Protecting your digital security and privacy with advanced cybersecurity solutions.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://cybersafe.md">
    
    <!-- Security Headers -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; img-src 'self' data:; style-src 'unsafe-inline'">
    
    <title>CyberSafe - Digital Security Solutions</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="preload" as="image" href="binary.png">
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        
        .logo-container {
            margin-bottom: 30px;
            animation: fadeInDown 0.8s ease-out;
        }
        
        .full-screen-image {
            max-width: 300px;
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        
        .personal-info {
            max-width: 500px;
            width: 100%;
            background-color: rgba(22, 33, 62, 0.8);
            backdrop-filter: blur(10px);
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(224, 224, 224, 0.1);
            animation: fadeInUp 0.8s ease-out 0.2s both;
        }
        
        .personal-info h1 {
            font-size: 2.5rem;
            margin-bottom: 15px;
            color: #00d4ff;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .personal-info p {
            font-size: 1.1rem;
            margin-bottom: 20px;
            line-height: 1.6;
            color: #b0b0b0;
        }
        
        .personal-info a {
            color: #00d4ff;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s ease;
            border-bottom: 2px solid transparent;
        }
        
        .personal-info a:hover {
            color: #00f0ff;
            border-bottom: 2px solid #00d4ff;
        }
        
        .contact-section {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid rgba(224, 224, 224, 0.1);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 20px;
        }
        
        .social-links a {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            width: 40px;
            height: 40px;
            background-color: rgba(0, 212, 255, 0.1);
            border-radius: 50%;
            transition: all 0.3s ease;
        }
        
        .social-links a:hover {
            background-color: rgba(0, 212, 255, 0.3);
            transform: translateY(-3px);
        }
        
        @keyframes fadeInDown {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        @media (max-width: 768px) {
            .personal-info {
                padding: 30px 20px;
            }
            
            .personal-info h1 {
                font-size: 2rem;
            }
            
            .personal-info p {
                font-size: 1rem;
            }
            
            .full-screen-image {
                max-width: 250px;
            }
        }
        
        @media (max-width: 480px) {
            body {
                padding: 15px;
            }
            
            .personal-info {
                padding: 25px 15px;
            }
            
            .personal-info h1 {
                font-size: 1.75rem;
            }
            
            .full-screen-image {
                max-width: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="logo-container">
        <img src="binary.png" alt="CyberSafe Binary Logo - Digital Security Symbol" class="full-screen-image">
    </div>
    
    <div class="personal-info">
        <h1>Welcome to CyberSafe</h1>
        <p>Your trusted partner in digital security and privacy protection.</p>
        
        <div class="contact-section">
            <p>For any inquiries, please contact us at:</p>
            <p><a href="mailto:admin@cybersafe.md">admin@cybersafe.md</a></p>
        </div>
    </div>
</body>
</html>
